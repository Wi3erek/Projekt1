<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie</title>
    <!-- Ładowanie Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="script.js"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <!-- KARTA LOGOWANIA -->
    <div id="box2" class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-200 flex flex-col gap-6">

        <!-- NAGŁÓWEK KARTY -->
        <div id="head" class="flex items-center justify-between border-b border-gray-100 pb-4">
            <h2 class="text-lg font-bold text-gray-900 tracking-tight">ZALOGUJ SIĘ</h2>
            <a href="index.html" class="text-sm font-medium text-indigo-600 hover:text-indigo-700 hover:underline">← Artykuły</a>
        </div>

        <!-- FORMULARZ -->
        <div id="formbox" class="flex flex-col gap-4">
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-1">Login:</label>
                <input id="loglogin" type="text" name="login"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50">
            </div>

            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider block mb-1">Hasło:</label>
                <input id="logpasswd" type="password" name="passwd"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-gray-50">
            </div>

            <input id="loginbutton" type="submit" value="Zaloguj"
                class="w-full py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition shadow-sm mt-2 cursor-pointer text-center">
        </div>

        <!-- STOPKA KARTY -->
        <div class="text-center pt-2 border-t border-gray-100">
            <a href="signup.html" class="text-sm font-medium text-gray-500 hover:text-indigo-600 transition">Zarejestruj się</a>
        </div>

    </div>

</body>

</html>
