<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            margin: 0 auto;
            margin-top: 100px;
            width: 500px;
            height: 600px;
            background-color: antiquewhite;
            text-align: center;
        }

        #formbox {
            display: flex;
            justify-content: space-around;
            margin: 0 auto;
            width: 220px;
            height: 150px;
            background-color: rgb(163, 127, 74);
        }

        label {
            float: left;
            margin: 0 auto;
        }

        input {
            float: left;
            width: 200px;
        }
    </style>
</head>

<body>
    <div id="box">
        <div id="head">
            ZALOGUJ SIĘ
            <a href="index.html">Artykuły</a>
        </div>
        <div id="formbox">
            <form>
                <label>Login:</label>
                <input type="text" name="login">
                <label>Hasło:</label>
                <input type="password" name="passwd">
                <input type="submit" value="Zaloguj">
            </form>

        </div>
        <a href="signup.html">Zarejestruj się</a>
    </div>
</body>

</html>
