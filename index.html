<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona główna</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="script.js"></script>
</head>

<body>
    <dialog id="addform">
        <h3>Napisz nowy artykuł</h3>
        <label>Imię autora:</label>
        <input id="addartauthorfirst" type="text">
        <label>Nazwisko autora:</label>
        <input id="addartauthorsur" type="text">
        <label>Data:</label>
        <input id="addartdate" type="date">
        <label>Tytuł:</label>
        <input id="addarttitle" type="text">
        <label>Treść artykułu:</label>
        <textarea id="addarttext"></textarea>
        <button onclick="addarttodb()">Dodaj</button>
        <button onclick="addartcancel()">Anuluj</button>
    </dialog>
    <dialog id="editform">
        <h3>Edytuj artykuł</h3>
        <input type="hidden" id="editartid">
        <label>Imię autora::</label>
        <input id="editartauthorfirst" type="text">
        <label>Nazwisko autora:</label>
        <input id="editartauthorsur" type="text">
        <label>Data:</label>
        <input id="editartdate" type="date">
        <label>Tytuł:</label>
        <input id="editarttitle" type="text">
        <label>Treść artykułu:</label>
        <textarea id="editarttext"></textarea>
        <button onclick="editarttodb()">Zapisz zmiany</button>
        <button onclick="editartcancel()">Anuluj</button>
    </dialog>
    <div id="box">
        <header>
            <div class="headbox" id="addbox">
                <div id="logasbox">
                    <div id="logtext">
                        Zalogowano jako:
                    </div>
                    <div id="logas"></div>
                </div>
            </div>
            <div id="headtitle">
                <div id="title">
                    Artykuły
                </div>
            </div>
            <div class="headbox">
                <div class="button" id="login">
                    <a href="login.html">Log in</a>
                </div>
                <div class="button" id="register">
                    <a href="signup.html">Sign up</a>
                </div>
                <div class="button" id="logout">
                    Log out
                </div>
            </div>
        </header>
        <div id="left">
            <button onclick="showaddform()">Dodaj</button>
            <br>
            Sortowanie:
            <select id="sortby" onchange="reload()">
                <option value="author_surname">Autor [nazwisko]</option>
                <option value="date">Data</option>
                <option value="title">Tytuł</option>
                <option value="id">ID</option>
            </select>
            Autorzy:
            <select id="authorsel" onchange="authorsel()">
                <option value="all">Wszyscy autorzy</option>
            </select>
        </div>
        <div id="center">
        </div>

    </div>
    <div id="right">

    </div>


    </div>



</body>

</html>
