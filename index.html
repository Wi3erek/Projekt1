<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARTKUŁY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="script.js"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- NOWY ARTYKUŁ -->
    <dialog id="addform" class="rounded-xl shadow-2xl p-6 w-full max-w-lg bg-white backdrop:bg-gray-900/50 outline-none border border-gray-100">
        <h3 class="text-xl font-bold text-gray-900 text-center mb-4">Napisz nowy artykuł</h3>
        <div class="flex flex-col gap-3">
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Imię autora</label>
                <input id="addartauthorfirst" type="text"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Nazwisko autora</label>
                <input id="addartauthorsur" type="text"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Data</label>
                <input id="addartdate" type="date"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Tytuł</label>
                <input id="addarttitle" type="text"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Treść artykułu</label>
                <textarea id="addarttext"
                    class="w-full mt-1 h-40 px-3 py-2 border border-gray-300 rounded-md resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <div class="flex justify-end gap-2 mt-2">
                <button onclick="addartcancel()" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 transition font-medium">Anuluj</button>
                <button onclick="addarttodb()" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition font-medium">Dodaj</button>
            </div>
        </div>
    </dialog>

    <!-- EDYTOWANIE ARTYKUŁU -->
    <dialog id="editform" class="rounded-xl shadow-2xl p-6 w-full max-w-lg bg-white backdrop:bg-gray-900/50 outline-none border border-gray-100">
        <h3 class="text-xl font-bold text-gray-900 text-center mb-4">Edytuj artykuł</h3>
        <input type="hidden" id="editartid">
        <div class="flex flex-col gap-3">
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Imię autora</label>
                <input id="editartauthorfirst" type="text"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Nazwisko autora</label>
                <input id="editartauthorsur" type="text"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Data</label>
                <input id="editartdate" type="date"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Tytuł</label>
                <input id="editarttitle" type="text"
                    class="w-full mt-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Treść artykułu</label>
                <textarea id="editarttext"
                    class="w-full mt-1 h-40 px-3 py-2 border border-gray-300 rounded-md resize-none focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <div class="flex justify-end gap-2 mt-2">
                <button onclick="editartcancel()"
                    class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md hover:bg-gray-200 transition font-medium">Anuluj</button>
                <button onclick="editarttodb()" class="px-4 py-2 bg-emerald-600 text-white rounded-md hover:bg-emerald-700 transition font-medium">Zapisz
                    zmiany</button>
            </div>
        </div>
    </dialog>

    <!-- GŁÓWNY CONTENT -->
    <div id="box" class="flex flex-col flex-1">

        <!-- NAGŁÓWEK -->
        <header class="bg-white border-b border-gray-200 h-16 px-6 flex items-center justify-between shadow-sm sticky top-0 z-10">
            <!-- NAGŁÓWEK - ZALOGOWANO JAKO... -->
            <div id="addbox" class="w-1/4">
                <div id="logasbox" class="flex items-center gap-1.5 text-sm">
                    <span id="logtext" class="text-gray-500">Zalogowano jako:</span>
                    <span id="logas" class="font-semibold text-indigo-600"></span>
                </div>
            </div>

            <!-- NAGŁÓWEK - TYTUŁ -->
            <div id="headtitle" class="flex-1 text-center">
                <h1 id="title" class="text-xl font-bold tracking-tight text-gray-900">Artykuły</h1>
            </div>

            <!-- NAGŁÓWEK - LOGOWANIE / REJESTRACJA -->
            <div class="w-1/4 flex justify-end gap-3 text-sm font-medium">
                <a id="login" href="login.html" class="px-3 py-1.5 border border-indigo-600 text-indigo-600 rounded-md hover:bg-indigo-50 transition">Log in</a>
                <a id="register" href="signup.html" class="px-3 py-1.5 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 transition shadow-sm">Sign up</a>
                <button id="logout" class="px-3 py-1.5 bg-gray-100 text-gray-600 rounded-md hover:bg-gray-200 transition">Log out</button>
            </div>
        </header>

        <!-- GŁÓWNY CONTENT-->
        <div class="flex flex-1">

            <!-- LEWY MARGINES -->
            <aside id="left" class="w-64 bg-white border-r border-gray-200 p-5 flex flex-col gap-4 text-sm shrink-0">
                <button onclick="showaddform()" class="w-full py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition shadow-sm">
                    + Dodaj artykuł
                </button>

                <hr class="border-gray-100">

                <div class="flex flex-col gap-1.5">
                    <label for="sortby" class="font-semibold text-gray-600">Sortowanie:</label>
                    <select id="sortby" onchange="reload()"
                        class="w-full px-2.5 py-2 border border-gray-300 rounded-md bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="author_surname">Autor [nazwisko]</option>
                        <option value="date">Data</option>
                        <option value="title">Tytuł</option>
                        <option value="id">ID</option>
                    </select>
                </div>

                Rosnąco: <input type="checkbox" id="isdesc">

                <div class="flex flex-col gap-1.5">
                    <label for="authorsel" class="font-semibold text-gray-600">Autorzy:</label>
                    <select id="authorsel" onchange="authorsel()"
                        class="w-full px-2.5 py-2 border border-gray-300 rounded-md bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="all">Wszyscy autorzy</option>
                    </select>
                </div>
            </aside>

            <!-- ŚRODEK (Artykuły) -->
            <main id="center" class="flex-1 p-8 max-w-4xl mx-auto w-full overflow-y-auto h-[calc(100vh-4rem)]">

            </main>

            <!-- PRAWY MARGINES  -->
            <aside id="right" class="w-48 bg-gray-50 border-l border-gray-100 hidden xl:block">
            </aside>

        </div>
    </div>

</body>

</html>
